name: Apply VIP hover fix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/vip-hover-fix-v28.patch
      - .github/workflows/apply-vip-hover-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source patch
        run: |
          git apply --check scripts/vip-hover-fix-v28.patch
          git apply scripts/vip-hover-fix-v28.patch
          rm scripts/vip-hover-fix-v28.patch

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix VIP+ icon hover isolation"
          git push origin main
